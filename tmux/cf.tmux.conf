# claude-fleet tmux config — used for the per-zellij-session `cf-*` sockets.
# tmux is the hidden substrate that keeps each Claude session alive in the
# background; the claude-fleet grid is the front-end. This runs NESTED inside a
# zellij pane, so keep bindings clear of zellij's (C-g/p/t/n/h/s/o/q + Alt-n/f).

# Prefix on C-a (zellij doesn't grab it). C-a C-a sends a literal C-a to the app.
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Back to the claude-fleet grid = detach the client (the session keeps running).
#   prefix g  (mnemonic: Grid)   /  prefix d  (classic detach)
bind g detach-client
bind d detach-client

# No status bar — the grid IS the status UI, and zellij already draws one.
set -g status off

# Behave well nested + with Claude/vim.
set -g mouse on
set -sg escape-time 10
set -g focus-events on
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"     # truecolor passthrough (zellij -> tmux -> claude)
setw -g aggressive-resize on

# Keep sessions when you detach; only close a session when its process exits.
set -g destroy-unattached off
set -g remain-on-exit off
