# claude-fleet tmux config — used for the per-zellij-session `cf-*` sockets.
# tmux is the hidden substrate that keeps each Claude session alive in the
# background; the claude-fleet grid is the front-end. This runs NESTED inside a
# zellij pane, so keep bindings clear of zellij's (C-g/p/t/n/h/s/o/q + Alt-n/f).

# Prefix on C-a (zellij doesn't grab it). C-a C-a sends a literal C-a to the app.
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Step back one level = detach the client (the session keeps running). From
# master that's back to Projects; from a worker it's back to the sessions grid.
#   `      one-key back (no prefix)        <-- fastest
#   C-a g  (mnemonic: Grid)  /  C-a d      <-- fallback
# NOTE: the no-prefix backtick means you can't type a literal ` inside a session
# while attached. Comment the next line out (and use C-a g) if that bothers you.
bind -n '`' detach-client
bind g detach-client
bind d detach-client

# Jump to the sessions grid. Drops a "<socket>.goto" marker that the claude-fleet
# loop reads on detach (see enter_master in bin/claude-fleet), then detaches. (In a
# worker it just acts like a plain back.)
#   C-s    one chord, no prefix        <-- fastest
#   C-a s  (fallback / mnemonic)
# C-s only reaches tmux because the fleet zellij layout unbinds zellij's own Ctrl-s
# (scroll mode) — see layouts/fleet.kdl. If you launch outside that layout, use C-a s.
bind -n C-s run-shell 'printf grid > "#{socket_path}.goto"' \; detach-client
bind s run-shell 'printf grid > "#{socket_path}.goto"' \; detach-client

# Always-visible reminder of how to get back to the grid (this is the one thing
# that isn't obvious once you're inside a session). Renders at the bottom of the
# pane, above zellij's own bar.
set -g status on
set -g status-interval 5
set -g status-justify left
set -g status-style "bg=colour236,fg=colour252"
set -g status-left "#[bg=colour148,fg=colour16,bold] ● #S #[bg=colour236,fg=colour148,nobold]▏"
set -g status-left-length 60
# master shows the Ctrl-s / ` shortcuts; workers show the plain back hint.
# (Styles use one attribute per #[...] — a comma inside #[...] would be parsed as
# a #{?...} argument separator and split the conditional.)
set -g status-right "#{?#{==:#S,master},#[fg=colour252]#[bold]Ctrl-s#[fg=colour246]#[nobold] sessions   #[fg=colour252]#[bold]\`#[fg=colour246]#[nobold] back to #[fg=colour148]#[bold]Projects  ,#[fg=colour246]press #[fg=colour252]#[bold]\`#[fg=colour246]#[nobold] (or #[fg=colour252]#[bold]Ctrl-a g#[fg=colour246]#[nobold]) to go back to the #[fg=colour148]#[bold]fleet grid  }"
set -g status-right-length 80
set -g window-status-format ""
set -g window-status-current-format ""

# Behave well nested + with Claude/vim.
set -g mouse on
set -sg escape-time 10
set -g focus-events on
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"     # truecolor passthrough (zellij -> tmux -> claude)
setw -g aggressive-resize on

# Keep sessions when you detach; only close a session when its process exits.
set -g destroy-unattached off
set -g remain-on-exit off
